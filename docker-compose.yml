version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: evoexplore-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: evoexplore_password_change_in_production
      MONGO_INITDB_DATABASE: evoexplore
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - evoexplore-network

  mongo-express:
    image: mongo-express:latest
    container_name: evoexplore-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: evoexplore_password_change_in_production
      ME_CONFIG_MONGODB_URL: mongodb://admin:evoexplore_password_change_in_production@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb
    networks:
      - evoexplore-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  evoexplore-network:
    driver: bridge
